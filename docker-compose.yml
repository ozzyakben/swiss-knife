# Swiss Knife — local AI daily runner
# NOTE: Ollama runs NATIVELY on the host on EVERY platform; these containers
# reach it via host.docker.internal.
#   macOS:   Docker can't pass the Apple GPU — containerized Ollama is ~5-6x slower.
#   Windows: install the official Ollama Windows app (uses CUDA directly when an
#            NVIDIA GPU is present); host.docker.internal works on Docker Desktop.
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: swissknife-openwebui
    ports:
      - "3001:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=False          # single-user local; set True before sharing externally
      - ENABLE_API_KEYS=True      # needed for the cockpit's prompt sync (default is False; enables Settings → Account → API Keys)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openwebui-data:/app/backend/data
    restart: unless-stopped

  cockpit:
    build: ./cockpit
    container_name: swissknife-cockpit
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      # Full Docker stack runs Open WebUI too, so default to the LIGHT model to
      # avoid a 12B + containers nearly filling RAM. Override per .env:
      #   OLLAMA_MODEL=gemma4:12b-mlx  (quality — Apple Silicon ONLY, MLX)
      #   OLLAMA_MODEL=gemma4:12b      (quality on Windows/Linux — GGUF)
      # Or switch live in Settings.
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e4b}
      # Memory consolidation's quality step; on Windows/Linux set gemma4:12b.
      - OLLAMA_QUALITY_MODEL=${OLLAMA_QUALITY_MODEL:-}
      - DATABASE_URL=file:/data/cockpit.db
      # Calendar-day math (due dates, Today panel, routine titles) runs in this
      # container; without TZ Node computes days in UTC, shifting them a day for
      # any user west of UTC in the evening. ./swiss up / .\swiss up export it.
      - TZ=${TZ:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cockpit-data:/data
      # Captured/vision images (lib/uploads.ts writes to <cwd>/uploads). Without
      # this they silently vanish on every rebuild.
      - cockpit-uploads:/app/uploads
      # Voice capture: the image bundles ffmpeg + whisper-cli, but the STT model
      # stays on the host (it's large + machine-local). Mounted read-only at the
      # path WHISPER_MODEL points to (cockpit/Dockerfile). No model on the host →
      # the route returns a friendly 503 with the download command. Override the
      # host path with WHISPER_MODEL_DIR if your model lives elsewhere (the swiss
      # CLIs export it; ${HOME} covers a direct `docker compose up` on mac/Linux).
      - ${WHISPER_MODEL_DIR:-${HOME}/.cache/whisper}:/models:ro
    depends_on:
      - open-webui
    restart: unless-stopped

volumes:
  openwebui-data:
  cockpit-data:
  cockpit-uploads:
